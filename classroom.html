<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KlassConneqt | My Course Vault</title>
    <link rel="icon" href="logo.png">
    <style>
        :root {
            --primary-dark: #0f172a;
            --secondary-dark: #1e293b;
            --bg-light: #f8fafc;
            --text-dark: #334155;
            --accent-blue: #0284c7;
            --accent-green: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: var(--bg-light); color: var(--text-dark); line-height: 1.6; }

        /* NAV BAR */
        nav { background-color: var(--primary-dark); color: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; }
        .logo-title { font-size: 1.5rem; font-weight: 800; }
        .btn-home { padding: 8px 16px; background-color: #334155; color: white; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; font-weight: bold; }
        .btn-home:hover { background-color: #475569; }

        /* DASHBOARD LAYOUT */
        .vault-container { max-width: 1200px; margin: 40px auto; padding: 0 5%; }
        
        .vault-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; border-bottom: 2px solid #cbd5e1; padding-bottom: 10px; }
        .vault-header h2 { color: var(--primary-dark); font-size: 2rem; }
        
        /* BREADCRUMB BACK BUTTON (Hidden by default) */
        #backToFoldersBtn { display: none; padding: 8px 16px; background-color: #e2e8f0; color: #334155; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        #backToFoldersBtn:hover { background-color: #cbd5e1; }

        #loadingMsg { text-align: center; font-size: 1.2rem; color: #64748b; margin-top: 50px; font-weight: bold; }

        /* GRID SYSTEM */
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-top: 20px; }
        
        /* FOLDER CARDS (Step 1) */
        .folder-card { background: white; border-radius: 8px; padding: 30px 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-top: 5px solid var(--accent-blue); text-align: center; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
        .folder-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .folder-icon { font-size: 3.5rem; margin-bottom: 15px; }
        .folder-card h3 { color: var(--primary-dark); font-size: 1.3rem; }
        .folder-card p { color: #64748b; font-size: 0.9rem; margin-top: 5px; }

        /* MATERIAL CARDS (Step 2) */
        .material-card { background: white; border-radius: 8px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-left: 5px solid var(--accent-green); display: flex; flex-direction: column; justify-content: space-between; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; margin-bottom: 10px; }
        .badge-video { background: #fee2e2; color: #991b1b; }
        .badge-pdf { background: #dcfce7; color: #065f46; }

        .material-card h3 { font-size: 1.2rem; color: var(--primary-dark); margin-bottom: 5px; }
        .material-card p { font-size: 0.85rem; color: #64748b; margin-bottom: 20px; }
        
        .btn-open { text-align: center; width: 100%; padding: 10px; background: var(--accent-blue); color: white; border-radius: 4px; text-decoration: none; font-weight: bold; transition: opacity 0.3s; }
        .btn-open:hover { opacity: 0.9; }

    </style>
</head>
<body>

    <nav>
        <div class="logo-title">KLASSCONNEQT VAULT</div>
        <a href="hub-selection.html" class="btn-home">⬅ Hub</a>
    </nav>

    <div class="vault-container">
        <div class="vault-header">
            <div>
                <h2 id="pageTitle">My Subscribed Courses</h2>
                <p id="pageSubTitle">Select a course folder to view its materials.</p>
            </div>
            <button id="backToFoldersBtn" onclick="renderFolders()">🔙 Back to Folders</button>
        </div>

        <div id="loadingMsg">⏳ Syncing your vault... Please wait.</div>
        
        <div class="grid-layout" id="dynamicGrid"></div>
    </div>

    <script>
    const userEmail = localStorage.getItem('portalUser');

    if (!userEmail) {
        window.location.href = 'login.html';
    }

    let allCourses = [];

    function renderFolders() {

        document.getElementById('pageTitle').innerText =
            'My Subscribed Courses';

        document.getElementById('pageSubTitle').innerText =
            'Select a course folder to view its materials.';

        document.getElementById('backToFoldersBtn').style.display =
            'none';

        const batches = [...new Set(
            allCourses.map(course => course.batch)
        )];

        let html = '';

        batches.forEach(batch => {

            html += `
                <div class="folder-card"
                     onclick="openFolder('${batch.replace(/'/g, "\\'")}')">

                    <div class="folder-icon">📚</div>

                    <h3>${batch}</h3>

                    <p>Click to view materials</p>

                </div>
            `;
        });

        document.getElementById('dynamicGrid').innerHTML = html;
    }

    function openFolder(batchName) {

        document.getElementById('pageTitle').innerText =
            batchName;

        document.getElementById('pageSubTitle').innerText =
            'Available materials';

        document.getElementById('backToFoldersBtn').style.display =
            'block';

        const materials = allCourses.filter(
            course => course.batch === batchName
        );

        let html = '';

        materials.forEach(item => {

            const badgeClass =
                item.type.toLowerCase() === 'video'
                    ? 'badge-video'
                    : 'badge-pdf';
            let materialLink = '';

if(
item.type.toLowerCase() === 'video' &&
(
(item.url || '').includes('youtube') ||
(item.url || '').includes('youtu.be')
)
){

materialLink =
`youtube-player.html?id=${item.fileId}`;

}
else if(
item.type.toLowerCase() === 'pdf'
){

materialLink =
`pdf-viewer.html?id=${item.fileId}`;

}
else if(
item.type.toLowerCase() === 'video'
){

materialLink =
`video-player.html?id=${item.fileId}`;

}
else{

materialLink =
item.url;

}
            html += `
                <div class="material-card">

                    <div>

                        <span class="badge ${badgeClass}">
                            ${item.type}
                        </span>

                        <h3>${item.title}</h3>

                        <p>
                            ${item.subject} • ${item.subCategory}
                        </p>

                    </div>

                    <a href="${materialLink}"
target="_blank"
class="btn-open">
Open Material
</a>

                </div>
            `;
        });

        document.getElementById('dynamicGrid').innerHTML =
            html;
    }

    window.onload = function () {

        const SCRIPT_URL =
'https://script.google.com/macros/s/AKfycbzPLuiYptDZx5GvbJFGdxv8XYm4W4-2Jd7fLxBvV4F3MagSTjl8W_qZKa2GzuPVPP-5/exec';

        fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: 'getCourses',
                email: userEmail
            })
        })
        .then(response => response.text())
        .then(text => {

            console.log('Response:', text);

            const data = JSON.parse(text);

            if (data.status === 'success') {

                allCourses = data.courses;

                document.getElementById('loadingMsg').style.display =
                    'none';

                renderFolders();

            } else {

                document.getElementById('loadingMsg').innerText =
                    'Error: ' + data.message;
            }
        })
        .catch(error => {

            console.error(error);

            document.getElementById('loadingMsg').innerText =
                'Network Error. Please try again.';
        });
    };
</script>
</body>
</html>
