<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KlassConneqt | Support Center</title>
    <style>
        :root { --primary-dark: #0f172a; --bg-light: #f8fafc; --text-dark: #334155; --accent-blue: #0284c7; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-light); color: var(--text-dark); line-height: 1.6; }
        
        nav { background-color: var(--primary-dark); color: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; }
        .logo-title { font-weight: bold; font-size: 1.2rem; }
        .btn-home { padding: 8px 16px; background: #334155; color: white; border-radius: 4px; text-decoration: none; font-weight: bold; }
        
        .container { max-width: 1000px; margin: 400px auto; padding: 0 5%; margin-top: 40px; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; border-top: 4px solid var(--accent-blue); }
        
        h2 { margin-bottom: 15px; color: var(--primary-dark); }
        label { font-weight: bold; display: block; margin-top: 15px; margin-bottom: 5px; }
        select, textarea, input[type="file"] { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 4px; margin-bottom: 10px; }
        textarea { height: 100px; resize: vertical; }
        button { background: var(--accent-blue); color: white; padding: 12px 24px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 1rem; width: 100%; transition: 0.3s; }
        button:hover { opacity: 0.9; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }

        /* TABLE TRACKER */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #e2e8f0; font-size: 0.95rem; }
        th { background: #e2e8f0; color: var(--primary-dark); font-weight: bold; }
        
        .status-Open { color: #b45309; font-weight: bold; background: #fef3c7; padding: 4px 8px; border-radius: 4px;}
        .status-In-Progress { color: #1d4ed8; font-weight: bold; background: #dbeafe; padding: 4px 8px; border-radius: 4px;}
        .status-Resolved { color: #047857; font-weight: bold; background: #d1fae5; padding: 4px 8px; border-radius: 4px;}
        
        #loadingMsg { color: #64748b; font-weight: bold; text-align: center; margin: 20px 0; }

        /* 🌟 MODERN NOTIFICATION TOAST SYSTEMS */
        .toast-box { position: fixed; top: 20px; right: 20px; padding: 15px 25px; background: #0f172a; color: white; font-weight: bold; border-radius: 6px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: none; z-index: 9999; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="toast" class="toast-box"></div>

    <nav>
        <div class="logo-title">IT SERVICE DESK</div>
        <a href="hub-selection.html" class="btn-home">⬅ Return to Hub</a>
    </nav>

    <div class="container">
        <div class="card">
            <h2>Raise a Support Ticket</h2>
            <p>Our admin desk will review and respond to your request shortly.</p>
            
           <label>Mobile Number (Compulsory for Contact) <span style="color:red;">*</span></label>
<input type="text" id="studentMobile" placeholder="Enter your mobile number">
            <label>Issue Category</label>
            <select id="category"><option>Loading options...</option></select>

            <label>Description of Issue</label>
            <textarea id="description" placeholder="Please provide details so our team can help you faster..."></textarea>

            <label>Attach Screenshot (Optional)</label>
            <input type="file" id="attachment" accept="image/*">

            <button id="submitBtn" onclick="processTicket()">Submit Ticket to Admin</button>
        </div>

        <h2>My Ticket History</h2>
        <div id="loadingMsg">Fetching your ticket history...</div>
        
        <div class="table-wrapper">
            <table id="ticketTable" style="display:none;">
                <thead>
                    <tr>
                        <th>Ticket ID</th>
                        <th>Date</th>
                        <th>Category</th>
                        <th>Status</th>
                        <th>Admin Reply</th>
                    </tr>
                </thead>
                <tbody id="ticketBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        // ⚠️ ENSEURE YOUR CHOSEN EXEC MASTER URL IS PASTED HERE
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzPLuiYptDZx5GvbJFGdxv8XYm4W4-2Jd7fLxBvV4F3MagSTjl8W_qZKa2GzuPVPP-5/exec';
        
        const userEmail = localStorage.getItem('portalUser');
        if (!userEmail) window.location.href = 'login.html';

        window.onload = function() {
            loadCategories();
            fetchTickets();
        }

        // 🌟 UNIQUE NOTIFICATION TOAST SYSTEM
        function showNotification(msg, color="#0284c7") {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.background = color;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 4000);
        }

        // 📋 FIXED: NOW SENDS A CORRECT POST REQUEST TO THE BACKEND
        function loadCategories() {
            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "getCategories" })
            })
            .then(r => r.text())
            .then(text => {
                let data = JSON.parse(text);
                if(data.status === "success") {
                    const select = document.getElementById('category');
                    select.innerHTML = "";
                    data.categories.forEach(cat => {
                        select.innerHTML += `<option value="${cat}">${cat}</option>`;
                    });
                }
            }).catch(e => {
                console.error("Category load error:", e);
                document.getElementById('category').innerHTML = "<option>Error loading categories</option>";
            });
        }

        function fetchTickets() {
            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "getMyTickets", email: userEmail })
            })
            .then(r => r.text())
            .then(text => {
                let data = JSON.parse(text);
                if(data.status === "success") {
                    const tbody = document.getElementById('ticketBody');
                    tbody.innerHTML = "";
                    if(data.tickets.length === 0) {
                        document.getElementById('loadingMsg').innerText = "You have no active support tickets.";
                        return;
                    }
                    document.getElementById('loadingMsg').style.display = 'none';
                    document.getElementById('ticketTable').style.display = 'table';
                    
                    data.tickets.forEach(t => {
                        let statusDisplayClass = t.status.replace(/\s+/g, '-');
                        tbody.innerHTML += `
                            <tr>
                                <td><b>${t.id}</b></td>
                                <td>${String(t.date).split(',')[0]}</td>
                                <td>${t.category}</td>
                                <td><span class="status-${statusDisplayClass}">${t.status}</span></td>
                                <td><i>${t.reply}</i></td>
                            </tr>
                        `;
                    });
                }
            }).catch(e => console.error("History fetch error:", e));
        }

        function processTicket() {
            const btn = document.getElementById('submitBtn');
            const desc = document.getElementById('description').value;
            const fileInput = document.getElementById('attachment');
            
            const sMobile = document.getElementById('studentMobile').value.trim();

if (!/^[0-9]{10}$/.test(sMobile)) {
    showNotification("⚠️ Enter a valid 10-digit mobile number.", "#b91c1c");
    return;
}
if(desc.trim() === "") { showNotification("⚠️ Please type an issue description.", "#b91c1c"); return; }
            
            btn.innerText = "Encoding & Syncing App...";
            btn.disabled = true;

            if (fileInput.files.length > 0) {
                const reader = new FileReader();
                reader.onload = function(e) { sendData(e.target.result); };
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                sendData(""); 
            }
        }

        function sendData(fileBase64) {
            const payload = {
    action: "submitTicket",
    email: userEmail,
    mobile: document.getElementById('studentMobile').value, // 🌟 ADD THIS LINE
    category: document.getElementById('category').value,
    description: document.getElementById('description').value,
    fileUrl: fileBase64
};
            fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) })
            .then(r => r.text()) // 🛡️ READ AS TEXT FIRST TO PREVENT SILENT FREEZES
            .then(text => {
                console.log("Raw Sync Response:", text);
                let data = JSON.parse(text);
                
                if(data.status === "success") {
                    showNotification(`✅ Ticket ${data.ticketId} Saved to Core System!`, "#059669");
                    document.getElementById('description').value = "";
                    document.getElementById('attachment').value = "";
                    document.getElementById('submitBtn').innerText = "Submit Ticket to Admin";
                    document.getElementById('submitBtn').disabled = false;
                    fetchTickets(); 
                } else {
                    showNotification("❌ System Error: " + data.message, "#b91c1c");
                    document.getElementById('submitBtn').disabled = false;
                    document.getElementById('submitBtn').innerText = "Submit Ticket to Admin";
                }
            }).catch(e => {
                showNotification("❌ Network delivery error.", "#b91c1c");
                document.getElementById('submitBtn').disabled = false;
                document.getElementById('submitBtn').innerText = "Submit Ticket to Admin";
            });
        }
    </script>
</body>
</html>
