<!DOCTYPE html>
<html>
<head>

<title>KlassConneqt PDF Viewer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.js"></script>

<style>

body{
margin:0;
background:#f5f5f5;
overflow:auto;
}

#watermark{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) rotate(-30deg);

font-size:32px;
font-weight:bold;

color:rgba(0,0,0,0.12);

pointer-events:none;

z-index:9999;

text-align:center;
white-space:pre-line;
}

#pdfContainer{
padding:20px;
}

canvas{
display:block;
margin:auto;
margin-bottom:15px;

max-width:100%;
height:auto;
}

*{
user-select:none;
-webkit-user-select:none;
}

</style>

</head>

<body oncontextmenu="return false;">

<div id="watermark"></div>

<div id="pdfContainer"></div>

<script>

const userEmail =
localStorage.getItem(
'portalUser'
);

if(!userEmail){

window.location.href =
'login.html';

}

document.getElementById(
'watermark'
).innerText =
userEmail;

document.addEventListener(
'contextmenu',
e=>e.preventDefault()
);

const params =
new URLSearchParams(
window.location.search
);

const fileId =
params.get('id');

const pdfUrl =
`https://drive.google.com/uc?export=download&id=${fileId}`;

pdfjsLib
.getDocument(pdfUrl)
.promise
.then(

async function(pdf){

for(

let pageNum=1;

pageNum<=pdf.numPages;

pageNum++

){

const page =
await pdf.getPage(
pageNum
);

const viewport =
page.getViewport({
scale:1.5
});

const canvas =
document.createElement(
'canvas'
);

const ctx =
canvas.getContext(
'2d'
);

canvas.height =
viewport.height;

canvas.width =
viewport.width;

document
.getElementById(
'pdfContainer'
)
.appendChild(
canvas
);

await page.render({

canvasContext:ctx,

viewport:viewport

}).promise;

}

}

)
.catch(function(error){

document
.getElementById(
'pdfContainer'
)
.innerHTML =

'<h2 style="text-align:center;">Unable to load PDF</h2>';

console.error(error);

});

</script>

</body>
</html>
