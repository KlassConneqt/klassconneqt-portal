<!DOCTYPE html>
<html>
<head>

<title>KlassConneqt PDF Viewer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>

body{
margin:0;
background:#f5f5f5;
overflow:auto;
}

#watermark{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) rotate(-30deg);

font-size:32px;
font-weight:bold;

color:rgba(0,0,0,0.12);

pointer-events:none;

z-index:9999;

text-align:center;
white-space:pre-line;
}

#pdfContainer{
padding:20px;
}

canvas{
display:block;
margin:auto;
margin-bottom:15px;

max-width:100%;
height:auto;
}

*{
user-select:none;
-webkit-user-select:none;
}

</style>

</head>

<body oncontextmenu="return false;">

<div id="watermark"></div>

<div id="pdfContainer"></div>

<script>

  pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

console.log(
'PDF.js Loaded:',
pdfjsLib
);  
  
const userEmail =
localStorage.getItem(
'portalUser'
);

const startTime =
Date.now();
if(!userEmail){

window.location.href =
'login.html';

}

document.getElementById(
'watermark'
).innerText =
userEmail;

document.addEventListener(
'contextmenu',
e=>e.preventDefault()
);

const params =
new URLSearchParams(
window.location.search
);

const fileId =
params.get('id');
console.log(
'FILE ID:',
fileId
);  

const SCRIPT_URL =
'https://script.google.com/macros/s/AKfycbzPLuiYptDZx5GvbJFGdxv8XYm4W4-2Jd7fLxBvV4F3MagSTjl8W_qZKa2GzuPVPP-5/exec';
  fetch(
SCRIPT_URL,
{
method:"POST",
body:JSON.stringify({

action:"logModuleOpen",

email:userEmail,

module:fileId,

materialType:"PDF"

})
}
);

fetch(
SCRIPT_URL,
{
method:'POST',
body:JSON.stringify({
action:'getPdf',
fileId:fileId
})
}
)

.then(response=>response.text())

.then(base64=>{

  console.log(
'Base64 Length:',
base64.length
);
const binary =
atob(base64);

const bytes =
new Uint8Array(
binary.length
);

for(
let i=0;
i<binary.length;
i++
){

bytes[i] =
binary.charCodeAt(i);

}

return pdfjsLib
.getDocument({
data:bytes
})
.promise;

})

.then(async function(pdf){

console.log(
'PDF Loaded Successfully'
);

console.log(
'Pages:',
pdf.numPages
);
for(

let pageNum=1;

pageNum<=pdf.numPages;

pageNum++

){

const page =
await pdf.getPage(
pageNum
);

const viewport =
page.getViewport({
scale:2
});

const canvas =
document.createElement(
'canvas'
);

const ctx =
canvas.getContext(
'2d'
);

canvas.height =
viewport.height;

canvas.width =
viewport.width;

document
.getElementById(
'pdfContainer'
)
.appendChild(
canvas
);

await page.render({

canvasContext:ctx,

viewport:viewport

}).promise;

}

}

)
.catch(function(error){

document
.getElementById(
'pdfContainer'
)
.innerHTML =

'<h2 style="text-align:center;">Unable to load PDF</h2>';

console.error(error);

});

  document.addEventListener(
'keydown',
function(e){

if(

e.key === 'F12' ||

(
e.ctrlKey &&
e.shiftKey &&
['I','J','C']
.includes(
e.key.toUpperCase()
)
)

||

(
e.ctrlKey &&
e.key.toUpperCase()==='U'
)

){

e.preventDefault();

e.stopPropagation();

return false;

}

},
true
);


window.onkeydown =
function(e){

if(e.keyCode === 123){

return false;

}

if(

e.ctrlKey &&
e.shiftKey &&
(
e.keyCode === 73 ||
e.keyCode === 74 ||
e.keyCode === 67
)

){

return false;

}

if(

e.ctrlKey &&
e.keyCode === 85

){

return false;

}

};

  window.addEventListener(
"beforeunload",
function(){

let minutes =

Math.max(

1,

Math.round(

(Date.now()-startTime)

/60000

)

);

navigator.sendBeacon(

SCRIPT_URL,

JSON.stringify({

action:"logModuleClose",

email:userEmail,

module:fileId,

materialType:"PDF",

duration:minutes

})

);

}
);
</script>

</body>
</html>
