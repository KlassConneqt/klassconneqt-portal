<!DOCTYPE html>
<html>
<head>

<title>KlassConneqt YouTube Player</title>

<script src="https://www.youtube.com/iframe_api"></script>

<style>

body{
margin:0;
background:#000;
overflow:hidden;
}

#videoWrapper{
position:relative;
width:100%;
height:calc(100vh - 70px);
}

#player{
width:100%;
height:100%;
}

#shield{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
z-index:999;
background:transparent;
}
    #controls{

height:70px;

background:#111;

display:flex;

justify-content:center;

align-items:center;

gap:10px;

flex-wrap:wrap;

}
button,
select{

padding:10px;

font-weight:bold;

cursor:pointer;

font-size:16px;

}  
#watermark{

position:fixed;

top:50%;
left:50%;

transform:
translate(-50%,-50%)
rotate(-35deg);

font-size:22px;

font-weight:bold;

color:rgba(255,255,255,0.14);

white-space:pre-line;

pointer-events:none;

z-index:9999;

text-align:center;
}

</style>

</head>

<body oncontextmenu="return false;">

<div id="watermark"></div>

<div id="videoWrapper">

    <div id="player"></div>

    <div id="shield"></div>

</div>

<div id="controls">

<button onclick="rewindVideo()">
⏪ 10s
</button>

<button
id="playBtn"
onclick="togglePlay()">
▶ Play
</button>

<button onclick="forwardVideo()">
⏩ 10s
</button>

<select
id="qualitySelect"
onchange="changeQuality()">
</select>

</div>

<script>

  const userEmail =
localStorage.getItem(
'portalUser'
);

const SCRIPT_URL =
'https://script.google.com/macros/s/AKfycbzPLuiYptDZx5GvbJFGdxv8XYm4W4-2Jd7fLxBvV4F3MagSTjl8W_qZKa2GzuPVPP-5/exec';

const startTime =
Date.now();

if(!userEmail){

window.location.href =
'login.html';

}

async function loadWatermark(){

let ip = "Hidden";

try{

const response =
await fetch(
'https://api.ipify.org?format=json'
);

const data =
await response.json();

ip =
data.ip.split('.')
.slice(0,2)
.join('.')
+
'.xxx.xxx';
}catch(err){}

document.getElementById(
'watermark'
).innerText =

userEmail +

'\n' +

new Date()
.toLocaleString()

+

'\n' +

ip;

}

loadWatermark();

setInterval(
loadWatermark,
60000
);

  const params =
new URLSearchParams(
window.location.search
);

const videoId =
params.get('id');

    fetch(
SCRIPT_URL,
{
method:"POST",
body:JSON.stringify({
action:"logModuleOpen",
email:userEmail,
module:videoId,
materialType:"YouTube"
})
})
.catch(function(err){
console.log(err);
});

let player;

  function onYouTubeIframeAPIReady(){

player =
new YT.Player(

'player',

{

videoId:videoId,

playerVars:{

controls:0,

modestbranding:1,

rel:0,

disablekb:1,

fs:0,

iv_load_policy:3,

playsinline:1

},
events:{

onReady:function(){

player.playVideo();

setTimeout(function(){

player.pauseVideo();

populateQuality();

},3000);

}
}

}

);

}

  function togglePlay(){

if(
player.getPlayerState()
=== YT.PlayerState.PLAYING
){

player.pauseVideo();

document.getElementById(
'playBtn'
).innerText =
'▶ Play';

}
else{

player.playVideo();

document.getElementById(
'playBtn'
).innerText =
'⏸ Pause';

}

}

  function forwardVideo(){

player.seekTo(

player.getCurrentTime()
+10,

true

);

}

  function rewindVideo(){

player.seekTo(

player.getCurrentTime()
-10,

true

);

}

  function populateQuality(){

const levels =
player.getAvailableQualityLevels();

const select =
document.getElementById(
'qualitySelect'
);

select.innerHTML='';

if(!levels || levels.length===0){

const option =
document.createElement(
'option'
);

option.text =
'Auto';

option.value =
'auto';

select.appendChild(
option
);

return;

}

const labels = {

hd2160:'2160p',
hd1440:'1440p',
hd1080:'1080p',
hd720:'720p',
large:'480p',
medium:'360p',
small:'240p'

};

levels.forEach(level=>{

const option =
document.createElement(
'option'
);

option.value =
level;

option.text =
labels[level] || level;

select.appendChild(
option
);

});

}

function changeQuality(){

player
.setPlaybackQuality(

document.getElementById(
'qualitySelect'
).value

);

}

  document.addEventListener(
'contextmenu',
e=>e.preventDefault()
);

document.addEventListener(
'keydown',
function(e){

if(e.key==='F12')
e.preventDefault();

if(
e.ctrlKey &&
e.shiftKey &&
['I','J','C']
.includes(
e.key.toUpperCase()
)
)
e.preventDefault();

if(
e.ctrlKey &&
e.key.toUpperCase()==='U'
)
e.preventDefault();

}
);

    //=============================
// LOG YOUTUBE CLOSE
//=============================

window.addEventListener(
"beforeunload",
function(){

let minutes =

Math.max(
1,
Math.round(
(Date.now()-startTime)
/60000
)
);

navigator.sendBeacon(

SCRIPT_URL,

JSON.stringify({

action:"logModuleClose",

email:userEmail,

module:videoId,

materialType:"YouTube",

duration:minutes

})

);

}
);

</script>

</body>
</html>
