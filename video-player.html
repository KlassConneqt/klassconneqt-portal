<!DOCTYPE html>
<html>
<head>

<title>KlassConneqt Secure Player</title>

<style>

body{
    margin:0;
    background:#000;
}

#watermark{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) rotate(-30deg);

    font-size:32px;
    font-weight:bold;

    color:rgba(255,255,255,0.15);

    pointer-events:none;

    z-index:9999;
}

iframe{
    width:100%;
    height:100vh;
    border:none;
}

</style>

</head>

<body>

<div id="watermark"></div>

<iframe
id="videoFrame"
allow="autoplay"
sandbox="allow-scripts allow-same-origin"
allowfullscreen>
</iframe>

<script>

const userEmail =
localStorage.getItem('portalUser');

if(!userEmail){

    window.location.href='login.html';

}

document.getElementById(
'watermark'
).innerText =
userEmail;

const params =
new URLSearchParams(
window.location.search
);

const fileId =
params.get('id');

document.getElementById(
'videoFrame'
).src =
`https://drive.google.com/file/d/${fileId}/preview`;

document.addEventListener(
'contextmenu',
function(e){
e.preventDefault();
}
);
    document.addEventListener(
'keydown',
function(e){

if(e.keyCode === 123){
e.preventDefault();
}

if(
e.ctrlKey &&
e.shiftKey &&
e.key === 'I'
){
e.preventDefault();
}

if(
e.ctrlKey &&
e.key === 'u'
){
e.preventDefault();
}

}
);

</script>

</body>
</html>
