<!DOCTYPE html>
<html>
<head>

<title>KlassConneqt Secure Player</title>

<style>

body{
    margin:0;
    background:#000;
}

#watermark{
    position:fixed;

    top:20px;
    left:20px;

    font-size:16px;
    font-weight:bold;

    white-space:pre-line;

    color:rgba(255,255,255,0.65);

    background:rgba(0,0,0,0.25);

    padding:8px;

    border-radius:8px;

    pointer-events:none;

    z-index:9999;

    transition:all 1s ease;
}
iframe{
    width:100%;
    height:100vh;
    border:none;
    user-select:none;
}

</style>

</head>

<body oncontextmenu="return false;">

<div id="watermark"></div>
<iframe
id="videoFrame"
allow="autoplay"
sandbox="allow-scripts allow-same-origin"
allowfullscreen>
</iframe>

<script>

const userEmail =
localStorage.getItem('portalUser');

if(!userEmail){

    window.location.href='login.html';

}

async function loadWatermark(){

let ip = "Hidden";

try{

const response =
await fetch(
'https://api.ipify.org?format=json'
);

const data =
await response.json();

ip =
data.ip.split('.')
.slice(0,2)
.join('.') +
'.xxx.xxx';

}catch(err){}

const now =
new Date();

document.getElementById(
'watermark'
).innerText =

userEmail +

'\n' +

now.toLocaleString()

+

'\n' +

ip;

}

loadWatermark();

setInterval(
loadWatermark,
60000
);

const positions = [

{top:'15%',left:'15%'},

{top:'15%',left:'45%'},

{top:'15%',left:'75%'},

{top:'45%',left:'15%'},

{top:'45%',left:'45%'},

{top:'45%',left:'75%'},

{top:'75%',left:'15%'},

{top:'75%',left:'45%'},

{top:'75%',left:'75%'}

];

let currentPosition = 0;

function moveWatermark(){

const wm =
document.getElementById(
'watermark'
);

currentPosition++;

if(
currentPosition >= positions.length
){
currentPosition = 0;
}

const pos =
positions[currentPosition];

wm.style.top='';
wm.style.left='';
wm.style.bottom='';
wm.style.right='';
Object.assign(
wm.style,
pos
);

}

moveWatermark();

setInterval(
moveWatermark,
5000
);

const params =
new URLSearchParams(
window.location.search
);

const fileId =
params.get('id');

document.getElementById(
'videoFrame'
).src =
`https://drive.google.com/file/d/${fileId}/preview`;

document.addEventListener(
'contextmenu',
function(e){
e.preventDefault();
}
);
    document.addEventListener(
'keydown',
function(e){

if(e.key === 'F12'){
e.preventDefault();
return false;
}

if(e.ctrlKey && e.shiftKey &&
   (e.key === 'I' || e.key === 'i')){
e.preventDefault();
return false;
}

if(
   e.ctrlKey &&
   e.shiftKey &&
   (e.key === 'J' || e.key === 'j')
){e.preventDefault();
return false;
}

if(
   e.ctrlKey &&
   e.shiftKey &&
   (e.key === 'C' || e.key === 'c')
){
e.preventDefault();
return false;
}

if(
e.ctrlKey &&
(e.key === 'U' || e.key === 'u')
){
e.preventDefault();
return false;
}
}
);

window.addEventListener(
'blur',
function(){

document.title =
'KlassConneqt Secure Player';

}
);
    
</script>
</body>
</html>
