<!DOCTYPE html>
<html>
<head>

<title>KlassConneqt Secure Player</title>

<style>

body{
    margin:0;
    background:#000;
}

#watermark{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) rotate(-30deg);

    font-size:24px;
    font-weight:bold;

    white-space:pre-line;

    color:rgba(255,255,255,0.15);

    pointer-events:none;

    z-index:9999;
}

iframe{
    width:100%;
    height:100vh;
    border:none;
    user-select:none;
}

</style>

</head>

<body oncontextmenu="return false;">

<div id="watermark"></div>
<iframe
id="videoFrame"
allow="autoplay"
sandbox="allow-scripts allow-same-origin"
allowfullscreen>
</iframe>

<script>

const userEmail =
localStorage.getItem('portalUser');

if(!userEmail){

    window.location.href='login.html';

}

async function loadWatermark(){

let ip = "Hidden";

try{

const response =
await fetch(
'https://api.ipify.org?format=json'
);

const data =
await response.json();

ip = data.ip;

}catch(err){}

const now =
new Date();

document.getElementById(
'watermark'
).innerText =

userEmail +

'\n' +

now.toLocaleString()

+

'\n' +

ip;

}

loadWatermark();

setInterval(
loadWatermark,
60000
);

const params =
new URLSearchParams(
window.location.search
);

const fileId =
params.get('id');

document.getElementById(
'videoFrame'
).src =
`https://drive.google.com/file/d/${fileId}/preview`;

document.addEventListener(
'contextmenu',
function(e){
e.preventDefault();
}
);
    document.addEventListener(
'keydown',
function(e){

if(e.keyCode === 123){
e.preventDefault();
}

if(
e.ctrlKey &&
e.shiftKey &&
e.key === 'I'
){
e.preventDefault();
}

if(
e.ctrlKey &&
e.key === 'u'
){
e.preventDefault();
}

}
);

window.addEventListener(
'blur',
function(){

document.title =
'KlassConneqt Secure Player';

}
);

</script>
</body>
</html>
