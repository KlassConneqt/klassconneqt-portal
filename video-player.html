<!DOCTYPE html>
<html>
<head>

<title>KlassConneqt Secure Player</title>

<style>

body{
    margin:0;
    background:#000;
}

#watermark{
    position:fixed;

    top:50%;
    left:50%;

    transform:
    translate(-50%,-50%)
    rotate(-35deg);

    font-size:22px;
    font-weight:bold;

    white-space:pre-line;

    color:rgba(255,255,255,0.14);

    pointer-events:none;

    z-index:9999;

    text-align:center;
}
iframe{
    width:100%;
    height:100vh;
    border:none;
    user-select:none;
    -webkit-user-select:none;
}

</style>

</head>

<body oncontextmenu="return false;">

<div id="watermark"></div>
<iframe
id="videoFrame"
allow="autoplay"
sandbox="allow-scripts allow-same-origin"
allowfullscreen>
</iframe>
    <script>

const userEmail =
localStorage.getItem(
'portalUser'
);

const SCRIPT_URL =
'https://script.google.com/macros/s/AKfycbzPLuiYptDZx5GvbJFGdxv8XYm4W4-2Jd7fLxBvV4F3MagSTjl8W_qZKa2GzuPVPP-5/exec';

const startTime =
Date.now();

if(!userEmail){

window.location.href =
'login.html';

}
async function loadWatermark(){

let ip = "Hidden";

try{

const response =
await fetch(
'https://api.ipify.org?format=json'
);

const data =
await response.json();

ip =
data.ip.split('.')
.slice(0,2)
.join('.') +
'.xxx.xxx';

}catch(err){}

const now =
new Date();

document.getElementById(
'watermark'
).innerText =

userEmail +

'\n' +

now.toLocaleString()

+

'\n' +

ip;

}

loadWatermark();

setInterval(
loadWatermark,
60000
);

const params =
new URLSearchParams(
window.location.search
);

const fileId =
params.get('id');
        fetch(SCRIPT_URL,{

method:"POST",

body:JSON.stringify({

action:"logModuleOpen",

email:userEmail,

module:fileId,

materialType:"Video"

})

});

const type =
params.get('type');

if(type === 'youtube'){

document.getElementById(
'videoFrame'
).removeAttribute(
'sandbox'
);

document.getElementById(
'videoFrame'
).src =
`https://www.youtube.com/embed/${fileId}?modestbranding=1&rel=0&iv_load_policy=3&disablekb=1`;

}
else{

document.getElementById(
'videoFrame'
).src =
`https://drive.google.com/file/d/${fileId}/preview`;

}
document.addEventListener(
'contextmenu',
function(e){
e.preventDefault();
}
);
    document.addEventListener(
'keydown',
function(e){

if(

e.key === 'F12' ||

(
e.ctrlKey &&
e.shiftKey &&
['I','J','C']
.includes(
e.key.toUpperCase()
)
)

||

(
e.ctrlKey &&
e.key.toUpperCase()==='U'
)

){

e.preventDefault();
e.stopPropagation();

return false;

}

},
true
);

window.addEventListener(
'blur',
function(){

document.title =
'KlassConneqt Secure Player';

}
);

        window.addEventListener(
"beforeunload",
function(){

let minutes =

Math.max(
1,
Math.round(
(Date.now()-startTime)
/60000
)
);

navigator.sendBeacon(

SCRIPT_URL,

JSON.stringify({

action:"logModuleClose",

email:userEmail,

module:fileId,

materialType:"Video",

duration:minutes

})

);

}
);
</script>
</body>
</html>
